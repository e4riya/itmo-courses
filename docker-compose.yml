services:
  postgres:
    image: postgres:16
    container_name: online_courses_postgres
    environment:
      POSTGRES_DB: online_courses
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongodb:
    image: mongo:7
    container_name: online_courses_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: online_courses_pgadmin
    profiles:
      - tools
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

  mongo-express:
    image: mongo-express:1.0.2
    container_name: online_courses_mongo_express
    profiles:
      - tools
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongodb:27017/
    ports:
      - "8081:8081"
    depends_on:
      - mongodb

volumes:
  postgres_data:
  mongo_data:
